name: CI for Microservice PR

on:
  pull_request:
    branches:
      - "dev/*-service"
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      service_kebab: ${{ steps.extract.outputs.service_kebab }}
      service_pascal: ${{ steps.pascal.outputs.service_pascal }}
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract service name from base branch (kebab-case)
        id: extract
        run: |
          BASE="${{ github.base_ref }}"
          SERVICE_KEBAB="${BASE#dev/}"
          echo "service_kebab=$SERVICE_KEBAB" >> $GITHUB_OUTPUT

      - name: Convert to PascalCase (folder name)
        id: pascal
        run: |
          KEBAB="${{ steps.extract.outputs.service_kebab }}"
          # Преобразование: user-service → UserService
          PASCAL=$(echo "$KEBAB" | sed -E 's/(^|-)([a-z])/\U\2/g')
          echo "service_pascal=$PASCAL" >> $GITHUB_OUTPUT

      - name: Check if folder exists
        id: folder-exists
        run: |
          if [ -d "${{ steps.pascal.outputs.service_pascal }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Get changed files in service folder
        if: steps.folder-exists.outputs.exists == 'true'
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            ${{ steps.pascal.outputs.service_pascal }}/**/*

      - name: Determine if we should run
        id: check
        run: |
          if [[ "${{ steps.folder-exists.outputs.exists }}" == "true" && "${{ steps.changed-files.outputs.any_changed }}" == "true" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: detect
    if: needs.detect.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    env:
      SERVICE_FOLDER: ${{ needs.detect.outputs.service_pascal }}
      SERVICE_NAME: ${{ needs.detect.outputs.service_kebab }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles(format('{0}/**/*.csproj', env.SERVICE_FOLDER)) }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        working-directory: ${{ env.SERVICE_FOLDER }}
        run: dotnet restore

      - name: Build
        working-directory: ${{ env.SERVICE_FOLDER }}
        run: dotnet build --configuration Release --no-restore

      - name: Test
        working-directory: ${{ env.SERVICE_FOLDER }}
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Check formatting
        id: format
        working-directory: ${{ env.SERVICE_FOLDER }}
        run: dotnet format --verify-no-changes --verbosity diagnostic
        continue-on-error: true

      - name: Comment PR about formatting failure
        if: steps.format.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Code formatting check failed** for `${{ env.SERVICE_NAME }}`.\n\nPlease run `dotnet format` locally and push fixes.'
            });

      - name: Fail if formatting failed
        if: steps.format.outcome == 'failure'
        run: exit 1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ env.SERVICE_FOLDER }}
          file: ./${{ env.SERVICE_FOLDER }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ env.SERVICE_NAME }}:pr-${{ github.event.number }}