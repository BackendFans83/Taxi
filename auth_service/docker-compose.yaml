services:
  db:
    image: postgres:17
    container_name: auth_postgres
    restart: always
    environment:
      POSTGRES_DB: taxi-auth-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - taxi-auth-service-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.4
    container_name: taxi-auth-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - taxi-auth-service-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  taxi-auth-service-network:
    driver: bridge

volumes:
  postgres_data:
